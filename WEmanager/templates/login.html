<div class="card" style="max-width: 350px; margin: 100px auto;">
    <h2 style="text-align:center">Connexion</h2>
    <form>
        {% csrf_token %} 
        <input type="text" placeholder="Nom d'utilisateur" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" placeholder="Mot de passe" style="width:100%; padding:10px; margin-bottom:15px;">
        <button class="btn btn-primary" style="width:100%; border:none;">Se connecter</button>
    </form>
    <p style="text-align:center"><a href="/signup">Créer un compte</a></p>
</div>
