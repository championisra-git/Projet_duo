<!DOCTYPE html>
<html lang="en">
<head>
    {%load static%}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="{% static '/css/WEmanagerstyle.css' %}">
</head>
<body>
    <div class="container">
    <div class="main-content">
        <h1>Connexion</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Se connecter</button>
        </form>
        <p>Pas de compte ? <a href="{% url 'signup' %}">S'inscrire</a></p>
    </div>
    </div>
</body>
</html>
