<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="stylesheet" href="{% static 'WEmanagerstyle.css' %}">


<div class="card" style="max-width: 500px; margin: auto;">
    <h2>Saisir un Relevé</h2>
    <form method="post">
        {% csrf_token %}
        
        <label>Sélectionner l'Abonné</label>
        <select name="abonne_id" required style="width:100%; padding:10px; margin:10px 0;">
            {% for a in abonnes %}
                <option value="{{ a.id }}">{{ a.nom }} (Compteur: {{ a.numero_compteur }})</option>
            {% endfor %}
        </select>

        <label>Mois</label>
        <input type="month" name="mois" required style="width:100%; padding:10px; margin:10px 0;">

        <label>Index Consommé</label>
        <input type="number" name="consommation" required style="width:100%; padding:10px; margin:10px 0;">

        <button type="submit" class="btn btn-success" style="width:100%;">Générer le relevé</button>
    </form>
</div>
