<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'WEmanagerstyle.css' %}">
    <title>Inscription - WEmanager</title>
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 450px; margin: 60px auto;">
            <h2 style="text-align:center; color: var(--primary);">Créer un compte</h2>
            <p style="text-align:center; color: #666;">Inscrivez-vous pour gérer les factures</p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            
            <form method="post">
                {% csrf_token %}

                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="Ex: daniel_prince" required 
                       style="width:100%; padding:12px; margin:8px 0; border: 1px solid #ccc; border-radius: 4px;">

                <label>Adresse Email</label>
                <input type="email" name="email" placeholder="exemple@mail.com" required
                       style="width:100%; padding:12px; margin:8px 0; border: 1px solid #ccc; border-radius: 4px;">

                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="********" required
                       style="width:100%; padding:12px; margin:8px 0; border: 1px solid #ccc; border-radius: 4px;">

                <label>Confirmer le mot de passe</label>
                <input type="password" name="password_confirm" placeholder="********" required
                       style="width:100%; padding:12px; margin:8px 0; border: 1px solid #ccc; border-radius: 4px;">

                <button type="submit" class="btn btn-primary" 
                        style="width:100%; border:none; padding:12px; font-size: 16px; margin-top: 15px; cursor: pointer;">
                    S'inscrire
                </button>
            </form>

            <div style="text-align:center; margin-top: 20px;">
                <p>Déjà un compte ? <a href="/login" style="color: var(--accent); text-decoration: none; font-weight: bold;">Connectez-vous ici</a></p>
            </div>
        </div>
    </div>
</body>
</html>
