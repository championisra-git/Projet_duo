<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    {% load static %}
    <link rel="stylesheet" href="{% static 'WEmanagerstyle.css' %}">
    <title>Dashboard - WEmanager</title>
</head>
<body>
    <nav class="navbar">
        <div class="logo">⚡ WEmanager - Suivi Factures</div>
        <div class="menu">
            <a href="/abonnes" style="color:white">Abonnés</a> | 
            <a href="/factures" style="color:white">Factures</a>
        </div>
    </nav>

    <div class="container">
        <h1>Tableau de Bord</h1>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
            <div class="card">
                <h3>Abonnés</h3>
                <p>Gérer les contrats eau/élec</p>
                <a href="/abonnes" class="btn btn-primary">Voir la liste</a>
            </div>
            <div class="card">
                <h3>Relevés</h3>
                <p>Saisir les consommations</p>
                <a href="/releves" class="btn btn-primary">Nouveau relevé</a>
            </div>
            <div class="card">
                <h3>Factures</h3>
                <p>Suivi des impayés</p>
                <a href="/factures" class="btn btn-success">Gérer les factures</a>
            </div>
        </div>
    </div>
</body>
</html>
