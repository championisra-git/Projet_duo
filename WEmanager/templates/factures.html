<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="{% static '/css/WEmanagerstyle.css' %}">
</head>
<body>
    <div clss="container">

                <a href="{%url 'abonnés' %}">Abonnés</a>
                <a href="{%url 'relevés' %}">Relevés</a> 
                <a href="{%url 'factures' %}">Factures</a>

        </div>

    </div>
